---
# --- Control Panel (Port 6969) ---
apiVersion: apps/v1
kind: Deployment
metadata: { name: control, namespace: k8s-demo }
spec:
  replicas: 1
  selector: { matchLabels: { app: control } }
  template:
    metadata: { labels: { app: control } }
    spec:
      containers:
      - name: app
        image: python:3.9-slim
        command: ["/bin/sh", "-c"]
        args: ["pip install flask requests --quiet && python /app/control.py"]
        volumeMounts: [{ name: code, mountPath: /app }]
      volumes: [{ name: code, configMap: { name: control-code } }]
---
apiVersion: v1
kind: Service
metadata: { name: control, namespace: k8s-demo }
spec:
  selector: { app: control }
  ports: [{ port: 8080, targetPort: 8080 }]
