apiVersion: v1
kind: Namespace
metadata: { name: k8s-demo }
---
# --- Opfer 1 (Port 4000) ---
apiVersion: apps/v1
kind: Deployment
metadata: { name: victim-1, namespace: k8s-demo }
spec:
  replicas: 1
  selector: { matchLabels: { app: victim-1 } }
  template:
    metadata: { labels: { app: victim-1 } }
    spec:
      containers:
      - name: app
        image: python:3.9-slim
        env:
        - name: POD_NAME
          valueFrom: { fieldRef: { fieldPath: metadata.name } }
        - name: PORT_NUM
          value: "4000"
        command: ["/bin/sh", "-c"]
        args: ["pip install flask --quiet && python /app/victim.py"]
        volumeMounts: [{ name: code, mountPath: /app }]
      volumes: [{ name: code, configMap: { name: victim-code } }]
---
apiVersion: v1
kind: Service
metadata: { name: victim-1, namespace: k8s-demo }
spec:
  selector: { app: victim-1 }
  ports: [{ port: 8080, targetPort: 8080 }]
